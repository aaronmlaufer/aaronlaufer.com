<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Lauf</title>
<style>
  /* ---- reset ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  /* ---- page ---- */
  body {
    /* warm ink — not true black, slight brown undertone */
    background: #14110e;
    color: #f1efe8;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
  }

  /* ---- masthead: burnt-orange bar, wordmark left, support right ---- */
  .masthead {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #c9551f;
    color: #14110e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(20px, 3vw, 40px);
    z-index: 100;
    border-bottom: 0.5px solid #14110e;
  }
  .masthead .wordmark {
    font-weight: 900;
    font-size: clamp(24px, 2.4vw, 32px);
    letter-spacing: 1.5px;
    color: #14110e;
    user-select: none;
    line-height: 1;
  }
  .masthead a {
    color: #14110e;
    text-decoration: none;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: opacity 200ms ease;
  }
  .masthead a:hover {
    opacity: 0.6;
  }

  /* ---- the foyer: exact viewport height, 2x2 block centered ---- */
  .foyer {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: 104px clamp(24px, 5vw, 80px) 56px;
    gap: clamp(20px, 3vh, 36px);
  }

  /* ---- exhibition caption ---- */
  .caption {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding-bottom: clamp(16px, 2vh, 28px);
    border-bottom: 0.5px solid #2e2a25;
  }
  .caption .title {
    font-size: clamp(13px, 1.1vw, 16px);
    letter-spacing: 0.3px;
    color: #f1efe8;
    font-weight: 400;
  }
  .caption .meta {
    font-size: 10px;
    letter-spacing: 3px;
    color: #5f5e5a;
    text-transform: uppercase;
    text-align: right;
    white-space: nowrap;
  }

  /* ---- the wall: 2x2 grid, fills available foyer space ---- */
  .wall {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
    gap: clamp(20px, 2.4vw, 40px);
    width: 100%;
    height: 100%;
    max-width: 95vw;
    margin: 0 auto;
    min-height: 0;
  }

  /* ---- paintings ---- */
  .painting {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 600ms cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    cursor: pointer;
    min-height: 0;
  }
  .painting:hover {
    transform: translateY(-3px);
  }
  .painting .frame {
    flex: 1;
    overflow: hidden;
    background: #1f1b16;
    position: relative;
    border: 0.5px solid #2e2a25;
    transition: border-color 600ms ease, background 400ms ease;
    min-height: 0;
  }
  .painting:hover .frame {
    border-color: #6a6258;
    background: #251f19;
  }
  .painting img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    filter: brightness(0.78) contrast(1.04) saturate(0.94);
    transition: filter 800ms ease, transform 1200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .painting:hover img {
    filter: brightness(1) contrast(1) saturate(1);
    transform: scale(1.03);
  }

  /* ---- placard: room name underneath ---- */
  .painting .placard {
    padding: 18px 2px 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .painting .label {
    font-weight: 700;
    font-size: clamp(16px, 1.5vw, 22px);
    letter-spacing: 3px;
    color: #f1efe8;
  }

  /* ---- responsive: collapse to single column on mobile ---- */
  @media (max-width: 600px) {
    .wall {
      grid-template-columns: 1fr;
      gap: 14px;
      max-width: 400px;
    }
    .foyer {
      justify-content: flex-start;
      padding-top: clamp(72px, 12vh, 100px);
    }
  }

  /* ---- focus state for keyboard nav ---- */
  .painting:focus-visible .frame {
    outline: 1px solid #f1efe8;
    outline-offset: 4px;
  }

  /* ---- print: hide everything ---- */
  @media print {
    body { display: none; }
  }
</style>
</head>
<body>

  <header class="masthead">
    <span class="wordmark">LAUF</span>
    <a href="mailto:support@lauf.example">Support</a>
  </header>

  <div class="foyer">

    <main class="wall" role="navigation" aria-label="The foyer">

      <a class="painting" href="https://run.lauf.example/" aria-label="Run">
        <div class="frame">
          <img src="images/run.jpg" alt="" loading="lazy">
        </div>
        <div class="placard">
          <span class="label">RUN</span>
        </div>
      </a>

      <a class="painting" href="https://trust.lauf.example/" aria-label="Trust">
        <div class="frame">
          <img src="images/trust.jpg" alt="" loading="lazy">
        </div>
        <div class="placard">
          <span class="label">TRUST</span>
        </div>
      </a>

      <a class="painting" href="https://hunt.lauf.example/" aria-label="Hunt">
        <div class="frame">
          <img src="images/hunt.jpg" alt="" loading="lazy">
        </div>
        <div class="placard">
          <span class="label">HUNT</span>
        </div>
      </a>

      <a class="painting" href="https://skin.lauf.example/" aria-label="Skin">
        <div class="frame">
          <img src="images/skin.jpg" alt="" loading="lazy">
        </div>
        <div class="placard">
          <span class="label">SKIN</span>
        </div>
      </a>

    </main>

  </div>

</body>
</html>
