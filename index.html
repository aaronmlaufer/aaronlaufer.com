<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Aaron Laufer — four rooms of ongoing work.">
<meta name="theme-color" content="#c9551f">
<meta property="og:title" content="LAUF">
<meta property="og:description" content="Four rooms of ongoing work.">
<meta property="og:image" content="https://aaronlaufer.com/images/trust.jpg">
<meta property="og:url" content="https://aaronlaufer.com/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23c9551f%22/><text x=%2250%22 y=%2274%22 font-family=%22Helvetica,Arial,sans-serif%22 font-size=%2272%22 font-weight=%22900%22 text-anchor=%22middle%22 fill=%22%2314110e%22>L</text></svg>">
<link rel="preload" as="image" href="images/trust.jpg" fetchpriority="high">
<link rel="preload" as="image" href="images/hunt.jpg" fetchpriority="high">
<title>Lauf</title>
<style>
  /* ---- reset ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  /* ---- page ---- */
  body {
    /* warm ink — not true black, slight brown undertone */
    background: #14110e;
    color: #f1efe8;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
  }

  /* ---- masthead: burnt-orange bar, wordmark left, support right ---- */
  .masthead {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #c9551f;
    color: #14110e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(20px, 3vw, 40px);
    z-index: 100;
    border-bottom: 0.5px solid #14110e;
  }
  .masthead .wordmark {
    font-weight: 900;
    font-size: clamp(24px, 2.4vw, 32px);
    letter-spacing: 1.5px;
    color: #14110e;
    user-select: none;
    line-height: 1;
  }
  .masthead a {
    color: #14110e;
    text-decoration: none;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: opacity 200ms ease;
  }
  .masthead a:hover {
    opacity: 0.6;
  }

  /* ---- the foyer: exact viewport height, 2x2 block centered ---- */
  .foyer {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    padding: 104px clamp(24px, 5vw, 80px) 56px;
    gap: clamp(20px, 3vh, 36px);
  }

  /* ---- exhibition caption ---- */
  .caption {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding-bottom: clamp(16px, 2vh, 28px);
    border-bottom: 0.5px solid #2e2a25;
  }
  .caption .title {
    font-size: clamp(13px, 1.1vw, 16px);
    letter-spacing: 0.3px;
    color: #f1efe8;
    font-weight: 400;
  }
  .caption .meta {
    font-size: 10px;
    letter-spacing: 3px;
    color: #5f5e5a;
    text-transform: uppercase;
    text-align: right;
    white-space: nowrap;
  }

  /* ---- the wall: 2x2 grid, fills available foyer space ---- */
  .wall {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-template-rows: repeat(2, minmax(0, 1fr));
    gap: clamp(20px, 2.4vw, 40px);
    width: 100%;
    height: 100%;
    max-width: 95vw;
    margin: 0 auto;
    min-height: 0;
  }

  /* ---- paintings ---- */
  .painting {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform 600ms cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    cursor: pointer;
    min-height: 0;
  }
  .painting:hover {
    transform: translateY(-3px);
  }
  .painting .frame {
    flex: 1;
    overflow: hidden;
    background: #1f1b16;
    position: relative;
    border: 0.5px solid #2e2a25;
    transition: border-color 600ms ease, background 400ms ease;
    min-height: 0;
  }
  .painting:hover .frame {
    border-color: #6a6258;
    background: #251f19;
  }
  .painting img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    filter: brightness(0.78) contrast(1.04) saturate(0.94);
    transition: filter 800ms ease, transform 1200ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .painting:hover img {
    filter: brightness(1) contrast(1) saturate(1);
    transform: scale(1.03);
  }

  /* ---- placard: room name underneath ---- */
  .painting .placard {
    padding: 18px 2px 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .painting .label {
    font-weight: 700;
    font-size: clamp(16px, 1.5vw, 22px);
    letter-spacing: 3px;
    color: #f1efe8;
  }

  /* ---- responsive: collapse to single column on mobile ---- */
  @media (max-width: 600px) {
    body {
      height: auto;
      overflow: auto;
    }
    .foyer {
      height: auto;
      min-height: 100vh;
      justify-content: flex-start;
      padding: clamp(80px, 14vh, 110px) 20px 40px;
      gap: 24px;
    }
    .wall {
      grid-template-columns: 1fr;
      grid-template-rows: none;
      grid-auto-rows: auto;
      gap: 28px;
      height: auto;
      max-width: 100%;
    }
    .painting {
      min-height: 0;
    }
    .painting .frame {
      flex: none;
      aspect-ratio: 4 / 3;
      height: auto;
    }
    .painting .placard {
      padding: 12px 2px 0;
    }
    .painting .label {
      font-size: 18px;
    }
  }

  /* ---- focus state for keyboard nav ---- */
  .painting:focus-visible .frame {
    outline: 1px solid #f1efe8;
    outline-offset: 4px;
  }

  /* ---- coming soon: faded tile with overlay ---- */
  .painting.soon {
    cursor: default;
  }
  .painting.soon:hover {
    transform: none;
  }
  .painting.soon .frame {
    opacity: 0.45;
  }
  .painting.soon:hover .frame {
    border-color: #2e2a25;
    background: #1f1b16;
  }
  .painting.soon:hover img {
    filter: brightness(0.78) contrast(1.04) saturate(0.94);
    transform: none;
  }
  .painting.soon .frame::after {
    content: attr(data-when);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-weight: 700;
    font-size: clamp(14px, 1.3vw, 18px);
    letter-spacing: 6px;
    color: #f1efe8;
    background: rgba(20, 17, 14, 0.72);
    padding: 8px 16px;
    border: 0.5px solid #6a6258;
    opacity: 1;
  }
  .painting.soon .label {
    color: #8a8278;
  }

  /* ---- entrance: stage the room ---- */
  @keyframes settle {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes drop {
    from { transform: translateY(-100%); }
    to   { transform: translateY(0); }
  }
  .masthead {
    animation: drop 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .caption {
    opacity: 0;
    animation: settle 700ms cubic-bezier(0.22, 1, 0.36, 1) 140ms forwards;
  }
  .painting {
    opacity: 0;
    animation: settle 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .painting:nth-of-type(1) { animation-delay: 220ms; }
  .painting:nth-of-type(2) { animation-delay: 300ms; }
  .painting:nth-of-type(3) { animation-delay: 380ms; }
  .painting:nth-of-type(4) { animation-delay: 460ms; }

  /* ---- reduced motion: skip the show ---- */
  @media (prefers-reduced-motion: reduce) {
    .masthead, .caption, .painting {
      animation: none;
      opacity: 1;
      transform: none;
    }
    .painting, .painting img, .painting .frame {
      transition: none;
    }
    .painting:hover { transform: none; }
    .painting:hover img { transform: none; filter: brightness(0.78) contrast(1.04) saturate(0.94); }
  }

  /* ---- print: hide everything ---- */
  @media print {
    body { display: none; }
  }
</style>
</head>
<body>

  <header class="masthead">
    <span class="wordmark">LAUF</span>
  </header>

  <div class="foyer">

    <div class="caption">
      <span class="title">Four Rooms, in no particular order</span>
      <span class="meta">MMXXVI</span>
    </div>

    <main class="wall" role="navigation" aria-label="Rooms">

      <a class="painting" href="https://fitness.aaronlaufer.com/" aria-label="Run">
        <div class="frame">
          <img src="images/run.jpg" alt="" loading="lazy">
        </div>
        <div class="placard">
          <span class="label">RUN</span>
        </div>
      </a>

      <a class="painting" href="https://altsdemo.aaronlaufer.com/" aria-label="Trust">
        <div class="frame">
          <img src="images/trust.jpg" alt="" loading="eager" fetchpriority="high">
        </div>
        <div class="placard">
          <span class="label">TRUST</span>
        </div>
      </a>

      <a class="painting" href="https://dealhub.aaronlaufer.com/" aria-label="Hunt">
        <div class="frame">
          <img src="images/hunt.jpg" alt="" loading="eager" fetchpriority="high">
        </div>
        <div class="placard">
          <span class="label">HUNT</span>
        </div>
      </a>

      <div class="painting soon" aria-label="Skin (coming Q3 2026)">
        <div class="frame" data-when="Q3 2026">
          <img src="images/skin.jpg" alt="" loading="lazy">
        </div>
        <div class="placard">
          <span class="label">SKIN</span>
        </div>
      </div>

    </main>

  </div>

</body>
</html>
